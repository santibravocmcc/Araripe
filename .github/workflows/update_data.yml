name: Streaming Detection (manual fallback)

# Manual-only fallback to the scheduled GEE path (detect_gee.yml). Streams
# current Sentinel-2 scenes from AWS and runs run_detection.py — works on a CI
# runner (fast network), unlike a throttled home connection. Use it if GEE is
# unavailable. Not on a schedule: only ONE path should run automatically, and
# that is detect_gee.yml (running both would double-detect and fight on push).
#
# Same R2 data flow as detect_gee.yml: baselines + recent alerts fetched from
# R2; new alerts uploaded to R2 (not committed); only the time-series DB is
# committed.

on:
  workflow_dispatch:       # Manual trigger only

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: araripe
          auto-activate-base: false
          use-mamba: true
          miniforge-version: latest

      - name: Fetch reflectance baselines from R2
        if: env.R2_ENDPOINT_URL != ''
        run: python scripts/fetch_baselines_from_r2.py

      - name: Fetch persistence state from R2 (gap-tolerant tracking)
        if: env.R2_ENDPOINT_URL != ''
        run: python scripts/r2_state.py get data/persistence_state.geojson

      - name: Run detection pipeline
        env:
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: python scripts/run_detection.py

      - name: Upload alerts to R2
        if: success() && env.R2_ENDPOINT_URL != ''
        run: python scripts/upload_to_r2.py --directory data/alerts --prefix alerts/ --pattern "*.geojson"

      - name: Upload persistence state to R2
        if: success() && env.R2_ENDPOINT_URL != ''
        run: python scripts/r2_state.py put data/persistence_state.geojson

      - name: Commit time-series DB
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/timeseries/
          git diff --staged --quiet || git commit -m "chore: update time-series $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
