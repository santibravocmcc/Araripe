name: GEE Deforestation Detection (headless)

# Scheduled, fully-automated Google Earth Engine detection: service account ->
# tiled synchronous pull -> existing detection logic. Runs twice a week and can
# also be triggered manually (with a custom date range) via "Run workflow".
#
# Data flow (nothing large in git):
#   - baselines are fetched from Cloudflare R2 (fetch_baselines_from_r2.py);
#   - recent alerts are fetched from R2 so temporal persistence can chain;
#   - new alerts are UPLOADED to R2 (alerts/ prefix), NOT committed to git
#     (they'd grow ~1-2 GB/year and blow the free Git-LFS tier); only the small
#     time-series DB is committed.
# The static Cloudflare site ingests alerts from R2 + the DB from git.
#
# Required repo config:
#   - secret  GEE_SA_KEY  : full service-account JSON key. The service account
#                           needs the **Earth Engine Resource Writer** role
#                           (roles/earthengine.writer) on a registered,
#                           EE-API-enabled project — Viewer is NOT enough
#                           (it lacks computations.create / thumbnails.create).
#   - secrets R2_ENDPOINT_URL / R2_ACCESS_KEY / R2_SECRET_KEY
#   - var     EE_PROJECT   : Earth Engine project id (defaults to ee-araripe)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start date YYYY-MM-DD (blank = today - 16 days)"
        required: false
      end:
        description: "End date YYYY-MM-DD exclusive (blank = tomorrow)"
        required: false
  schedule:
    - cron: '0 6 * * 1,4'   # Monday & Thursday 06:00 UTC

permissions:
  contents: write

jobs:
  detect-gee:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
      GEE_SA_KEY: ${{ secrets.GEE_SA_KEY }}
      EE_PROJECT: ${{ vars.EE_PROJECT || 'ee-araripe' }}
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # No lfs: baselines + alerts come from R2; land-cover rasters are plain git.

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: araripe
          auto-activate-base: false
          use-mamba: true
          miniforge-version: latest

      - name: Install Earth Engine client
        run: pip install -q earthengine-api requests

      - name: Fetch reflectance baselines from R2
        if: env.R2_ENDPOINT_URL != ''
        run: python scripts/fetch_baselines_from_r2.py

      - name: Fetch persistence state from R2 (gap-tolerant tracking)
        # The gap-tolerant persistence chains alerts across runs via a running
        # track state (n_sightings, first/last_seen) instead of re-reading recent
        # alert files. First run: no state yet -> starts fresh (all 1ª observação).
        if: env.R2_ENDPOINT_URL != ''
        run: python scripts/r2_state.py get data/persistence_state.geojson

      - name: Run GEE detection
        env:
          START: ${{ github.event.inputs.start }}
          END: ${{ github.event.inputs.end }}
        run: |
          python scripts/run_detection_gee.py \
            --project "$EE_PROJECT" --start "$START" --end "$END"

      - name: Upload alerts to R2
        if: success() && env.R2_ENDPOINT_URL != ''
        run: python scripts/upload_to_r2.py --directory data/alerts --prefix alerts/ --pattern "*.geojson"

      - name: Upload persistence state to R2
        if: success() && env.R2_ENDPOINT_URL != ''
        run: python scripts/r2_state.py put data/persistence_state.geojson

      - name: Commit time-series DB
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/timeseries/
          git diff --staged --quiet || git commit -m "chore: update time-series $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
