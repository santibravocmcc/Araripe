name: Keep-Alive

# GitHub disables scheduled workflows after 60 days without repository activity.
# The detection workflow only commits when there is a data diff, so a long dry
# spell could let both workflows be auto-disabled. This lightweight weekly
# heartbeat commits a timestamp file, keeping repository activity fresh (and
# thus both this workflow and update_data.yml enabled). It must live on the
# default branch (main) to be scheduled.
#
# Manual fallback if a workflow is ever disabled anyway:
#   gh workflow enable "Twice-Weekly Deforestation Detection"
#   gh workflow run update_data.yml
# (or use the "Enable workflow" button in the repo Actions tab).

on:
  schedule:
    - cron: '17 4 * * 0'   # Sundays 04:17 UTC (offset from the detect cron)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Heartbeat commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-keepalive
          git add .github/last-keepalive
          git commit -m "chore: keep-alive $(date -u +%Y-%m-%d)" || exit 0
          git pull --rebase origin main || true
          git push
